<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact - Elite Predator Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo"><img src="LogoSample_ByTailorBrands.jpg" alt="Logo"></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Episodes</a></li>
            </ul>
        </nav>
    </header>

    <main style="display: flex; justify-content: center; padding: 60px 5%;">
        <section id="contact" style="background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 500px;">
            <h2 style="text-align: center;">How can we help you?</h2>
            <form action="" method="get" style="display: flex; flex-direction: column; gap: 20px;">
                <input type="email" name="email" placeholder="Your Email" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                <input type="text" name="subject" placeholder="What's the issue?" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="Technological_problem"> Technological problem
                </label>
                
                <input type="submit" value="Send Message" class="btn-primary">
            </form>
        </section>
    </main>
</body>
</html>
